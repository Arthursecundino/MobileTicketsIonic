]<ion-header>
  <ion-toolbar color="success">
    <ion-title>👩‍💼 Painel do Atendente</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card *ngIf="senhaAtual" style="text-align:center;">
    <ion-card-header>
      <ion-card-title style="font-size:26px; font-weight:bold;">
        {{ senhaAtual.numero }}
      </ion-card-title>
      <ion-card-subtitle>Guichê {{ senhaAtual.guiche }}</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      TM estimado: <strong>{{ tm }} minutos</strong>
    </ion-card-content>
  </ion-card>

  <ion-button expand="block" color="warning" (click)="chamarProxima()" style="margin-top:20px;">
    📢 Chamar Próxima Senha
  </ion-button>

  <p *ngIf="semSenhas" style="text-align:center; color:red; margin-top:20px;">
    ⚠️ Nenhuma senha na fila ou fora do expediente.
  </p>
