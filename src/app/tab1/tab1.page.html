<ion-header>
  <ion-toolbar color="primary">
    <ion-title>🎫 Totem — Retirar Senha</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-card *ngIf="senhaEmitida" style="text-align:center;">
    <ion-card-header>
      <ion-card-title style="font-size:28px; font-weight:bold;">
        {{ senhaEmitida.numero }}
      </ion-card-title>
      <ion-card-subtitle>
        {{ senhaEmitida.tipo === 'SP' ? '🔴 Prioritário' :
           senhaEmitida.tipo === 'SE' ? '🟢 Retirada de Exames' : '🔵 Geral' }}
      </ion-card-subtitle>
    </ion-ca
